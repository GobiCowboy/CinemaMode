name: CinemaMode
options:
  bundleIdPrefix: com.cinemamode
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
targets:
  CinemaModeCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/CinemaModeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cinemamode.core
        GENERATE_INFOPLIST_FILE: YES
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
  CinemaMode:
    type: application
    platform: macOS
    sources:
      - path: Sources/CinemaMode
    preBuildScripts:
      - name: Copy App Icon
        script: |
          set -euo pipefail
          icon_src="${PROJECT_DIR}/Resources/AppIcon.icns"
          icon_dst="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Resources/AppIcon.icns"
          mkdir -p "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Resources"
          cp "${icon_src}" "${icon_dst}"
    dependencies:
      - target: CinemaModeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cinemamode.app
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/AppStore/Info.plist
        CODE_SIGN_ENTITLEMENTS: Entitlements/CinemaModeAppStore.entitlements
        DEVELOPMENT_TEAM: 4UNNXY925R
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
